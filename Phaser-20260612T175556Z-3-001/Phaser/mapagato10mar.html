function preload ()
{
    this.load.spritesheet('dude', 'assets/dude.png', { frameWidth: 32, frameHeight: 48 });
    this.load.image('pez', 'assets/star.png');
    this.load.audio('muerto', 'assets/muerto.wav');
    this.load.audio('win', 'assets/win.wav');
    this.load.audio('salto', 'assets/salto.wav');
    this.load.audio('punto', 'assets/punto.mp3');
    this.load.spritesheet('bomb', 'assets/bomb.png', { frameWidth: 40, frameHeight: 48 });
    this.load.audio('musicaambiente', 'assets/musica.mp3');
    this.load.tilemapTiledJSON('map', 'mapagato10mar.json');

}

function create ()

    tiles = map.addTilesetImage('texturas', 'tiles');
    stars = map.addTilesetImage('star', 'pez');
    fondo = map.createLayer('fondo', tiles, 0, 0 );
    nubes = map.createLayer('nubes', tiles, 0, 0 );
    montana = map.createLayer('montana', tiles, 0, 0 );
    plataformas = map.createLayer('plataformas', tiles, 0, 0 );
    adornos = map.createLayer('adornos', tiles, 0, 0 );
    stars = map.createLayer('star', stars, 0, 0);

    player = this.physics.add.sprite(50, 435, 'dude');
    this.cameras.main.startFollow(player);
    this.cameras.main.x=-1420;

    // colisión de plataformas
    plataformas.setCollision([747,798,787,788,827,826]);

    stars.setTileIndexCallback(881, hitFish, this);
    this.physics.add.overlap(player, stars);

bombs = this.physics.add.group();

    //  Player physics properties. Give the little guy a slight bounce.
    player.setBounce(0.2);
    player.setCollideWorldBounds(true);

    //  Our player animations, turning, walking left and walking right.
    this.anims.create({
        key: 'left',
        frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
        frameRate: 10,
        repeat: -1
    });

    this.anims.create({
        key: 'turn',
        frames: [ { key: 'dude', frame: 4 } ],
        frameRate: 20
    });

    this.anims.create({
        key: 'right',
        frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
        frameRate: 10,
        repeat: -1
    });

    //  Input Events
    cursors = this.input.keyboard.createCursorKeys();
 
    //  The score
    scoreText = this.add.text(16, 16, 'Peces: 0', { fontSize: '32px', fill: '#000' });

    // nose

    this.physics.add.collider(player, bombs, hitBomb, null, this);
}

    // personaje
function update ()
{
    if (gameOver)
    {

        return;
    }

    if (cursors.left.isDown)
    {
        player.setVelocityX(-160);

        player.anims.play('left', true);
    }
    else if (cursors.right.isDown)
    {
        player.setVelocityX(160);

        player.anims.play('right', true);
    }
    else
    {
        player.setVelocityX(0);

        player.anims.play('turn');
    }

    if (cursors.up.isDown && player.body.blocked.down)
    {
        player.setVelocityY(-330);
        this.sound.play('salto');
    }
    if (cursors.down.isDown)
    {
        player.setVelocityY(300);
    }
}

function hitFish (sprite, tile){
    stars.removeTileAt(tile.x, tile.y);
    score += 1;
    this.sound.play('punto');
    scoreText.setText('Peces: ' + score);
    if (score == 32)
    {
        this.sound.play('win');
        alert ('😻¡Has ganado!😻');
        window.location.reload();
        this.scene.pause;
    }
}


function hitBomb (player, bomb){
    this.physics.pause();

    player.setTint(0xff8500);

    player.anims.play('turn');

    gameOver = true;
    this.sound.play('muerto');
    alert('😿Has perdido ¡Inténtalo de nuevo!😿');
    window.location.reload();
}
