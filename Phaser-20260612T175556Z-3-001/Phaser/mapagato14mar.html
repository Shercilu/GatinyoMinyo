<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>El gatiño miño</title>
    <script src="phaser.js"></script>
    <style type="text/css">

<body>

<script type="text/javascript">

//PHASER

//renderizado automático
var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 608,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    }, //
    physics: {
        default: 'arcade', // motor de colisiones por cajas
        arcade: {
            gravity: { y: 300 }, //gravedad
            debug: false
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

//variables del juego

var player;
var adornos;
var fondo;
var montana;
var nubes;
var plataformas;
var map;
var tileset;
var borde;
var layer;
var stars;
var bombs;
var platforms;
var cursors;
var score = 0;
var gameOver = false;
var scoreText;
var tiles;

var game = new Phaser.Game(config);


//Precarga
function preload ()
{
    this.load.spritesheet('dude', 'assets/dude.png', { frameWidth: 32, frameHeight: 48 });
    this.load.image('pez', 'assets/star.png');
    this.load.audio('muerto', 'assets/muerto.wav');
    this.load.audio('win', 'assets/win.wav');
    this.load.audio('salto', 'assets/salto.wav');
    this.load.audio('punto', 'assets/punto.mp3');
    this.load.spritesheet('bomb', 'assets/bomb.png', { frameWidth: 40, frameHeight: 48 });
    this.load.audio('musicaambiente', 'assets/musica.mp3');
    this.load.tilemapTiledJSON('map', 'mapagato10mar.json');
    this.load.image('tiles', 'assets/texturas/texturas.png');
}

//Creación
function create ()
{
     //Mapa
    map = this.make.tilemap({ key: 'map', tileWidth: 32, tileHeight: 32 });

    tiles = map.addTilesetImage('texturas', 'tiles');
    stars = map.addTilesetImage('star', 'pez');
    fondo = map.createLayer('fondo', tiles, 0, 0 );
    nubes = map.createLayer('nubes', tiles, 0, 0 );
    montana = map.createLayer('montana', tiles, 0, 0 );
    plataformas = map.createLayer('plataformas', tiles, 0, 0 );
    adornos = map.createLayer('adornos', tiles, 0, 0 );
    stars = map.createLayer('star', stars, 0, 0);

    //El gatiño :3
    player = this.physics.add.sprite(50, 435, 'dude');

    //Cámara
    this.physics.world.setBounds(0, 0, 3008, 608);
    this.cameras.main.startFollow(player, true, 0.05, 0.05);
    this.cameras.main.setBounds(0, 0, 3008, 608);

    // colisión de plataformas
    plataformas.setCollision([747,798,787,788,827,826]);

    //Recolección de magikarps
    stars.setTileIndexCallback(881, hitFish, this);
    this.physics.add.overlap(player, stars);

    //Chocar con el suelo
    this.physics.add.collider(plataformas, player);

    //Perros grupo
    bombs = this.physics.add.group();

    //Creación perros
var bomb;
bomb = bombs.create(430, 180, 'bomb');
    bomb.setCollideWorldBounds(true);
    bomb.setBounce(0.2);   

    this.physics.add.collider(plataformas, bomb);
    this.tweens.add({
        targets: bomb,
        x: 610,
        duration: 1500,
        ease: 'Sine.easeInOut',
        flipX: true,
        yoyo: true,
        delay: 10,
        loop: -1,
        repeat: -1
    });



    var bomb2;
    bomb2 = bombs.create(870, 300, 'bomb'); //Metemos al perro en esa coordenada
    bomb2.setCollideWorldBounds(true); //Colisión mapa
    bomb2.setBounce(0.2);  //Rebota al caer
    this.physics.add.collider(plataformas, bomb2); //colisión plataformas
    this.tweens.add({ //Animación de movimiento
        targets: bomb2,
        x: 1000, 
        duration: 1100,
        ease: 'Sine.easeInOut',
        flipX: true,
        yoyo: true,
        delay: 10,
        loop: -1,
        repeat: -1
    });
    

    var bomb4;
    bomb4 = bombs.create(2000, 200, 'bomb');
    bomb4.setCollideWorldBounds(true);
    this.physics.add.collider(plataformas, bomb4);
    bomb4.setBounce(0.2);
    this.tweens.add({
        targets: bomb4,
        x: 2000,
        duration: 1100,
        ease: 'Sine.easeInOut',
        flipX: true,
        yoyo: true,
        delay: 10,
        loop: -1,
        repeat: -1
    });    

    var bomb5;
    bomb5 = bombs.create(2220, 300, 'bomb');
    bomb5.setCollideWorldBounds(true);
    this.physics.add.collider(plataformas, bomb5);
    bomb5.setBounce(0.2); 
    this.tweens.add({
        targets: bomb5,
        x: 2220,
        duration: 1100,
        ease: 'Sine.easeInOut',
        flipX: true,
        yoyo: true,
        delay: 10,
        loop: -1,
        repeat: -1
    });  
      

    var bomb6;
    bomb6 = bombs.create(3000, 100, 'bomb');
    bomb6.setCollideWorldBounds(true);
    this.physics.add.collider(plataformas, bomb6);
    bomb6.setBounce(0.2);
    this.tweens.add({
        targets: bomb6,
        x: 3000,
        duration: 1100,
        ease: 'Sine.easeInOut',
        flipX: true,
        yoyo: true,
        delay: 10,
        loop: -1,
        repeat: -1
    });  
      

    var bomb7;
    bomb7 = bombs.create(2800, 300, 'bomb');
    bomb7.setCollideWorldBounds(true);
    this.physics.add.collider(plataformas, bomb7);
    bomb7.setBounce(0.2);
    this.tweens.add({
        targets: bomb7,
        x: 2900,
        duration: 1100,
        ease: 'Sine.easeInOut',
        flipX: true,
        yoyo: true,
        delay: 10,
        loop: -1,
        repeat: -1
    }); 
    
    var bomb8;
    bomb8 = bombs.create(1900, 400, 'bomb');
    bomb8.setCollideWorldBounds(true);
    this.physics.add.collider(plataformas, bomb8);
    bomb8.setBounce(0.2);
    this.tweens.add({
        targets: bomb8,
        x: 2100,
        duration: 1100,
        ease: 'Sine.easeInOut',
        flipX: true,
        yoyo: true,
        delay: 10,
        loop: -1,
        repeat: -1
    });
      var bomb9;
    bomb9 = bombs.create(1800, 200, 'bomb');
    bomb9.setCollideWorldBounds(true);
    this.physics.add.collider(plataformas, bomb9);
    bomb9.setBounce(0.2);
    this.tweens.add({
        targets: bomb9,
        x: 1800,
        duration: 1100,
        ease: 'Sine.easeInOut',
        flipX: true,
        yoyo: true,
        delay: 10,
        loop: -1,
        repeat: -1
    });  

    // musica fondo
    this.sound.play('musicaambiente');
   
    //  El gatiño rebota
    player.setBounce(0.2);
    player.setCollideWorldBounds(true);

    //  Animaciones del gatiño
    this.anims.create({
        key: 'left',
        frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
        frameRate: 10,
        repeat: -1
    });

    this.anims.create({
        key: 'turn',
        frames: [ { key: 'dude', frame: 4 } ],
        frameRate: 20
    });

    this.anims.create({
        key: 'right',
        frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
        frameRate: 10,
        repeat: -1
    });

    //activar flechas del teclado
    cursors = this.input.keyboard.createCursorKeys();
 
    //  Puntuación
    scoreText = this.add.text(16, 16, 'Peces: 0', { fontSize: '32px', fill: '#000' });
    scoreText.setScrollFactor(0);

    
    //Activar función hitbomb si Gatiño toca perro (perder partida)
    this.physics.add.collider(player, bombs, hitBomb, null, this);
}

    
function update ()
{
    if (gameOver) //si pierdes se para el juego
    {

        return;
    }

    if (cursors.left.isDown) // movimiento izq
    {
        player.setVelocityX(-160);

        player.anims.play('left', true);
    }
    else if (cursors.right.isDown) //movimiento drcha
    {
        player.setVelocityX(160);

        player.anims.play('right', true);
    }
    else //no pulsar nada
    {
        player.setVelocityX(0);

        player.anims.play('turn');
    }

    if (cursors.up.isDown && player.body.blocked.down) //Saltar
    {
        player.setVelocityY(-330);
        this.sound.play('salto');
    }
    if (cursors.down.isDown)//Caída rápida
    {
        player.setVelocityY(300);
    }
}

//Función cuando Gatiño toca magikarsp
function hitFish (sprite, tile){
    stars.removeTileAt(tile.x, tile.y); //borramos el pez si lo ha tocado
    score += 1; //sumar punto
    this.sound.play('punto'); //Suena audio del punto
    scoreText.setText('Peces: ' + score); //Actualizar marcador
    if (score == 32) //Si consigues 32 peces ganas :)
    {
        this.sound.play('win');
        alert ('😻¡Has ganado!😻');
        window.location.reload();// Reinicia para poder jugar de nuevo
        this.scene.pause;
    }
}

//Función cuando Gatiño toca Perros
function hitBomb (player, bomb){
    this.physics.pause(); //congelamos el juego

    player.setTint(0xff8500); //Cambio de color de Gatiño (efecto daño)

    player.anims.play('turn'); //Se queda mirando el Gatiño de frente

    gameOver = true;
    this.sound.play('muerto'); //audio de game over
    alert('😿Has perdido ¡Inténtalo de nuevo!😿');
    window.location.reload(); //Reinicia la página
}



</script>

</body>
</html>
